spring:
  application:
    name: coreflow-backend

server:
  port: 8080

coreflow:
  api:
    base-path: /api
  cors:
    allowed-origins: ${COREFLOW_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  fitness:
    ascend:
      base-url: ${ASCEND_API_BASE_URL}
      host: ${ASCEND_API_HOST}
      key: ${ASCEND_API_KEY}
